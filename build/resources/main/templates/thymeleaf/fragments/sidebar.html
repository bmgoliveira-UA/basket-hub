        <a href="/eventos" class="nav-link" data-target="eventos">
            <i class="fa-solid fa-calendar-days"></i> <span>Eventos</span>
        </a>
        <a href="/jogos" class="nav-link" data-target="jogos">
            <i class="fa-solid fa-stopwatch"></i> <span>Jogos</span>

            <i class="fa-solid fa-list-ol"></i> <span>Classificações</span>
        </a>
    </nav>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const currentPath = window.location.pathname;

            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active'); // Limpeza preventiva
                const linkHref = link.getAttribute('href');

                // Validação inteligente para evitar falsos positivos na raiz do sistema
                if (linkHref === '/' && currentPath === '/') {
                    link.classList.add('active');
                } else if (linkHref !== '/' && (currentPath === linkHref || currentPath.startsWith(linkHref + '/'))) {
                    link.classList.add('active');
                }
            });
        });
    </script>
