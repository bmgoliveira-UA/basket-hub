<!DOCTYPE html>
<html th:replace="~{layout :: layout('Equipas', ~{::section})}">
<section>
    <div class="section-card">
        <div class="section-header">
            <h2>Gestão de Equipas</h2>
            <!-- Nova lógica de controlo de acessos aplicada -->
            <button class="btn" data-roles="ADMINISTRADOR,ORGANIZADOR" onclick="openModal('add')">
                <i class="fa-solid fa-plus"></i> Nova Equipa
            </button>
        </div>

        <div class="table-responsive">
            <table class="table-hub" id="equipasTable">
                <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Nome da Equipa</th>
                    <th style="width: 120px;">Sigla</th>
                    <th>Localidade</th>
                    <!-- Nova lógica de controlo de acessos aplicada -->
                    <th data-roles="ADMINISTRADOR,ORGANIZADOR" style="width: 100px; text-align: center;">Ações</th>
                </tr>
                </thead>
                <tbody>
                <!-- Injetado via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Limpa (Estilos agora centralizados no main.css) -->
    <div class="modal-overlay" id="equipaModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Nova Equipa</h3>
                <button class="btn-icon" data-dismiss="modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="equipaForm" onsubmit="event.preventDefault();">
                    <input type="hidden" id="equipaId">
                    <div class="modal-form-group">
                        <label>Nome da Equipa</label>
                        <input type="text" id="nome" required maxlength="100" placeholder="Ex: Aveiro Basket">
                    </div>
                    <div class="flex-form-row">
                        <div class="modal-form-group">
                            <label>Sigla Oficial</label>
                            <input type="text" id="sigla" required maxlength="10" style="text-transform: uppercase;" placeholder="Ex: ABC">
                        </div>
                        <div class="modal-form-group">
                            <label>Localidade</label>
                            <input type="text" id="localidade" required maxlength="100" placeholder="Ex: Aveiro">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                <button class="btn" onclick="saveEquipa()">Guardar Registo</button>
            </div>
        </div>
    </div>

    <script>
        const modalElement = document.getElementById('equipaModal');
        const modal = {
            open: () => { modalElement.style.display = 'flex'; },
            close: () => { modalElement.style.display = 'none'; }
        };

        document.querySelectorAll('[data-dismiss="modal"]').forEach(btn => {
            btn.addEventListener('click', () => modal.close());
        });

        let currentMode = 'add';

        async function loadEquipas() {
            const tbody = document.querySelector('#equipasTable tbody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center"><i class="fa-solid fa-spinner fa-spin"></i> A atualizar ecossistema...</td></tr>';
            try {
                // Presume-se que a função apiCall está definida no teu ui.js
                const perfil = localStorage.getItem('role') || 'JOGADOR';
                const equipas = await apiCall(`/equipas?perfil=${perfil}`);

                if (equipas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center"><i class="fa-solid fa-folder-open"></i> Nenhuma equipa registada.</td></tr>';
                    return;
                }

                tbody.innerHTML = equipas.map(eq => `
                    <tr>
                        <td><code>${eq.id}</code></td>
                        <td><strong>${eq.nome}</strong></td>
                        <td><span class="badge badge-primary">${eq.sigla}</span></td>
                        <td><span style="color: var(--text-muted); font-size: 13px;"><i class="fa-solid fa-location-dot" style="margin-right:4px;"></i>${eq.localidade}</span></td>
                        <td data-roles="ADMINISTRADOR,ORGANIZADOR">
                            <div class="actions-cell" style="justify-content: center;">
                                <button class="btn-icon" onclick="openModal('edit', ${eq.id})" title="Editar"><i class="fa-solid fa-pen" style="color: var(--primary);"></i></button>
                                <button class="btn-icon delete" onclick="deleteEquipa(${eq.id})" title="Eliminar"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `).join('');

                // Aplica o filtro aos novos elementos renderizados
                if (typeof aplicarFiltroDeAcesso === 'function') {
                    aplicarFiltroDeAcesso();
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center" style="color:var(--danger);"><i class="fa-solid fa-triangle-exclamation"></i> Falha ao carregar as equipas do servidor.</td></tr>';
            }
        }

        async function openModal(mode, id = null) {
            currentMode = mode;
            document.getElementById('equipaForm').reset();
            document.getElementById('modalTitle').innerText = mode === 'add' ? 'Nova Equipa' : 'Editar Parâmetros da Equipa';

            if (mode === 'edit') {
                try {
                    const perfil = localStorage.getItem('role') || 'JOGADOR';
                    const eq = await apiCall(`/equipas/${id}?perfil=${perfil}`);
                    document.getElementById('equipaId').value = eq.id;
                    document.getElementById('nome').value = eq.nome;
                    document.getElementById('sigla').value = eq.sigla;
                    document.getElementById('localidade').value = eq.localidade;
                } catch (e) {
                    alert('Impossível resgatar dados desta equipa.');
                    return;
                }
            }
            modal.open();
        }

        async function saveEquipa() {
            const form = document.getElementById('equipaForm');
            if(!form.checkValidity()) { form.reportValidity(); return; }

            const data = {
                nome: document.getElementById('nome').value,
                sigla: document.getElementById('sigla').value.toUpperCase(),
                localidade: document.getElementById('localidade').value
            };

            const id = document.getElementById('equipaId').value;
            const perfil = localStorage.getItem('role') || 'JOGADOR';
            try {
                if (currentMode === 'add') {
                    await apiCall(`/equipas?perfil=${perfil}`, 'POST', data);
                } else {
                    await apiCall(`/equipas/${id}?perfil=${perfil}`, 'PUT', data);
                }
                modal.close();
                loadEquipas();
            } catch (e) {
                alert('Erro ao processar o salvamento na base de dados.');
            }
        }

        async function deleteEquipa(id) {
            const perfil = localStorage.getItem('role') || 'JOGADOR';
            if (confirm('Tem a certeza absoluta que deseja remover esta equipa do ecossistema?')) {
                try {
                    await apiCall(`/equipas/${id}?perfil=${perfil}`, 'DELETE');
                    loadEquipas();
                } catch (e) {
                    alert('Erro crítico ao remover a equipa.');
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadEquipas);
    </script>
</section>
</html>
