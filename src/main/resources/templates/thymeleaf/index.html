<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasketHub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main.css">
</head>
<body data-perfil="">
<div class="app-container">

    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-basketball"></i>
            <span>BasketHub</span>
        </div>
        <nav class="nav-menu" id="sidebar-menu">
            <button class="nav-link" data-target="dashboard" onclick="switchTab('dashboard')"><i class="fa-solid fa-chart-pie"></i><span>Dashboard</span></button>
            <button class="nav-link" data-target="jogadores" onclick="switchTab('jogadores')" data-roles="ADMINISTRADOR"><i class="fa-solid fa-user"></i><span>Jogadores</span></button>
            <button class="nav-link" data-target="equipas" onclick="switchTab('equipas')" data-roles="ADMINISTRADOR,JOGADOR"><i class="fa-solid fa-shield-halved"></i><span>Equipas</span></button>
            <button class="nav-link" data-target="eventos" onclick="switchTab('eventos')" data-roles="ADMINISTRADOR,ORGANIZADOR,PATROCINADOR"><i class="fa-solid fa-calendar-days"></i><span>Eventos</span></button>
            <button class="nav-link" data-target="jogos" onclick="switchTab('jogos')" data-roles="ADMINISTRADOR,ORGANIZADOR,JOGADOR"><i class="fa-solid fa-trophy"></i><span>Jogos</span></button>
            <button class="nav-link" data-target="pavilhoes" onclick="switchTab('pavilhoes')" data-roles="ADMINISTRADOR"><i class="fa-solid fa-building"></i><span>Pavilhões</span></button>
            <button class="nav-link" data-target="organizadores" onclick="switchTab('organizadores')" data-roles="ADMINISTRADOR,ORGANIZADOR"><i class="fa-solid fa-user-tie"></i><span>Organizadores</span></button>
            <button class="nav-link" data-target="patrocinadores" onclick="switchTab('patrocinadores')" data-roles="ADMINISTRADOR,PATROCINADOR"><i class="fa-solid fa-handshake"></i><span>Patrocinadores</span></button>
            <button class="nav-link" data-target="inscricoes" onclick="switchTab('inscricoes')" data-roles="ADMINISTRADOR,ORGANIZADOR"><i class="fa-solid fa-file-signature"></i><span>Inscrições</span></button>
            <button class="nav-link" data-target="classificacoes" onclick="switchTab('classificacoes')" data-roles="ADMINISTRADOR,ORGANIZADOR,JOGADOR"><i class="fa-solid fa-list-ol"></i><span>Classificações</span></button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="page-title-area"><h1 id="current-view-title">Dashboard</h1></div>
            <div class="user-profile"><i class="fa-solid fa-circle-user"></i> <span id="user-display">Utilizador</span></div>
        </header>
        <div class="content-view" id="view-container"></div>
    </main>
</div>

<script>
    // Inicialização básica de proteção de interface
    (function() {
        const perfil = localStorage.getItem('perfil') || 'JOGADOR'; // Default para testes
        document.body.dataset.perfil = perfil;
        document.getElementById('user-display').innerText = perfil;

        // Filtra sidebar
        document.querySelectorAll('#sidebar-menu .nav-link').forEach(btn => {
            const roles = btn.getAttribute('data-roles');
            if (roles && !roles.includes(perfil)) {
                btn.style.display = 'none';
            }
        });
    })();
</script>
<script src="/static/ui.js"></script>
</body>
</html>
