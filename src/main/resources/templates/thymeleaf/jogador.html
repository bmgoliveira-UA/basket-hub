<div class="section-card">
    <h3><i class="fa-solid fa-user-magnifying-glass" style="color: var(--text-muted);"></i> Filtrar Estatísticas Individuais</h3>
    <div class="select-wrapper">
        <select id="jogadorSelect" onchange="carregarEstatisticas()">
            <option value="">-- Escolha um Jogador da Lista Dinâmica --</option>
            <option th:each="j : ${jogadores}"
                    th:value="${j.id}"
                    th:text="${j.nome} + ' (Posição: ' + ${j.posicao} + ')'">
            </option>
        </select>
    </div>
</div>

<div class="section-card" style="padding: 10px 0 0 0; overflow: hidden;">
    <div style="padding: 16px 24px 8px 24px;">
        <h3><i class="fa-solid fa-database" style="color: var(--text-muted);"></i> Histórico Analítico de Movimentos</h3>
    </div>

    <div class="table-responsive">
        <table class="table-hub">
            <thead>
            <tr>
                <th>Pontos Concretizados</th>
                <th>Assistências Claras</th>
                <th>Ressaltos Computados</th>
                <th>Estado de Validação</th>
            </tr>
            </thead>
            <tbody id="tabelaDados">
            <tr>
                <td colspan="4" class="text-center">
                    <i class="fa-solid fa-circle-info" style="margin-right: 6px;"></i> Selecione um atleta acima para carregar o histórico de rendimento.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function carregarEstatisticas() {
        const id = document.getElementById("jogadorSelect").value;
        const tbody = document.getElementById("tabelaDados");

        if (!id) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center"><i class="fa-solid fa-circle-info" style="margin-right: 6px;"></i> Selecione um atleta acima para carregar o histórico de rendimento.</td></tr>`;
            return;
        }

        tbody.innerHTML = `<tr><td colspan="4" class="text-center"><i class="fa-solid fa-spinner fa-spin" style="color: var(--primary); margin-right: 8px;"></i> A processar dados analíticos do atleta...</td></tr>`;

        try {
            const perfil = localStorage.getItem('perfil') || 'JOGADOR';
            // Passamos o perfil no request para respeitar o isolamento sem quebrar a tua rota
            const res = await fetch(`/estatisticas/${id}?perfil=${perfil}`);
            if (!res.ok) throw new Error();
            const dados = await res.json();

            tbody.innerHTML = "";

            if (dados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center"><i class="fa-solid fa-folder-open" style="margin-right: 6px;"></i> Nenhum registo estatístico encontrado para este atleta.</td></tr>`;
                return;
            }

            dados.forEach(e => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong style="font-size: 15px; color: var(--text-main);">${e.pontos}</strong> <span style="font-size: 12px; color: var(--text-muted);">pts</span></td>
                        <td><span style="font-weight: 500;">${e.assistencias}</span> <span style="font-size: 12px; color: var(--text-muted);">ast</span></td>
                        <td><span style="font-weight: 500;">${e.rebounds}</span> <span style="font-size: 12px; color: var(--text-muted);">reb</span></td>
                        <td><span class="badge badge-status">${e.estado}</span></td>
                    </tr>`;
            });

            aplicarFiltroDeAcesso();
        } catch(err) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center" style="color: var(--danger);"><i class="fa-solid fa-triangle-exclamation" style="margin-right: 6px;"></i> Falha ao comunicar com o servidor de dados.</td></tr>`;
        }
    }
</script>
