<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title : 'Painel'} + ' | BasketHub'">BasketHub</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/static/main.css}">
</head>
<body>
<div class="app-container">

    <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

    <main class="main-content">

        <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

        <div class="content-view" id="view-container">
            <th:block th:replace="${content}"></th:block>
        </div>
    </main>
</div>

<script th:src="@{/static/ui.js}"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Garante que, assim que o esqueleto carregar, tudo o que for proibido é escondido imediatamente
        if (typeof aplicarFiltroDeAcesso === 'function') {
            aplicarFiltroDeAcesso();
        }

        // Define o título inicial baseado no que veio do servidor
        const initialTitle = "[[${title != null ? title : 'Dashboard'}]]";
        const titleElement = document.getElementById('current-view-title');
        if (titleElement && initialTitle) {
            titleElement.innerText = initialTitle;
        }
    });
</script>

<th:block th:if="${scripts != null}">
    <th:block th:replace="${scripts}"></th:block>
</th:block>
</body>
</html>
