<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasketHub | Organizador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f8fafc; --bg-sidebar: #0f172a; --bg-sidebar-hover: #1e293b;
            --primary: #0284c7; --primary-light: #e0f2fe; --success: #16a34a;
            --danger: #dc2626; --warning: #d97706; --text-main: #0f172a;
            --text-muted: #64748b; --text-sidebar: #cbd5e1; --bg-card: #ffffff;
            --border-color: #e2e8f0; --radius: 12px;
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07); --transition: all 0.2s ease;
            --sidebar-width: 240px; --header-height: 60px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-sidebar); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; overflow-y: auto; }
        .sidebar-brand { padding: 20px 18px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
        .sidebar-brand img { width: 36px; }
        .sidebar-brand span { font-weight: 700; font-size: 18px; color: #fff; }
        .sidebar-section { padding: 18px 12px 6px; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #475569; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; margin: 2px 8px; border-radius: 8px; color: var(--text-sidebar); font-size: 14px; font-weight: 500; cursor: pointer; transition: var(--transition); border: none; background: none; width: calc(100% - 16px); text-align: left; }
        .nav-link:hover { background: var(--bg-sidebar-hover); color: #fff; }
        .nav-link.active { background: var(--success); color: #fff; }
        .nav-link i { width: 18px; text-align: center; font-size: 15px; }
        .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid #1e293b; }
        .btn-logout { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-radius: 8px; background: #1e293b; color: #94a3b8; border: none; cursor: pointer; font-size: 13px; width: 100%; transition: var(--transition); }
        .btn-logout:hover { background: #dc2626; color: #fff; }
        .main-wrapper { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
        .topbar { height: var(--header-height); background: var(--bg-card); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 28px; gap: 12px; position: sticky; top: 0; z-index: 50; }
        .topbar-icon { width: 34px; height: 34px; background: #dcfce7; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--success); }
        #current-view-title { font-weight: 600; font-size: 16px; }
        .role-badge { margin-left: auto; background: #dcfce7; color: var(--success); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
        #view-container { padding: 28px; flex: 1; }
        .grid-dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card-stat { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border-color); padding: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-md); }
        .stat-details h3 { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .stat-details p { font-size: 22px; font-weight: 700; }
        .stat-icon { font-size: 28px; opacity: 0.15; }
        .section-card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border-color); padding: 24px; box-shadow: var(--shadow-md); margin-bottom: 24px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border-color); }
        .section-header h2 { font-size: 16px; font-weight: 700; }
        .table-responsive { overflow-x: auto; }
        .table-hub { width: 100%; border-collapse: collapse; font-size: 14px; }
        .table-hub thead th { background: var(--bg-main); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }
        .table-hub tbody tr { border-bottom: 1px solid var(--border-color); transition: var(--transition); }
        .table-hub tbody tr:hover { background: #f8fafc; }
        .table-hub tbody td { padding: 12px 14px; vertical-align: middle; }
        .table-hub tbody tr:last-child { border-bottom: none; }
        .flex-form-row { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 14px; }
        .modal-form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
        .modal-form-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .modal-form-group input, .modal-form-group select { padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 14px; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); transition: var(--transition); outline: none; }
        .modal-form-group input:focus, .modal-form-group select:focus { border-color: var(--success); box-shadow: 0 0 0 3px rgba(22,163,74,0.1); }
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 8px; background: var(--primary); color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: var(--transition); }
        .btn:hover { background: #0369a1; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #15803d; }
        .btn-secondary { background: #f1f5f9; color: var(--text-main); }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-icon { width: 32px; height: 32px; border-radius: 7px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; transition: var(--transition); }
        .btn-icon.delete { background: #fee2e2; color: var(--danger); }
        .btn-icon.delete:hover { background: var(--danger); color: #fff; }
        .btn-icon.edit { background: #dbeafe; color: #2563eb; }
        .btn-icon.edit:hover { background: #2563eb; color: #fff; }
        .actions-cell { display: flex; gap: 6px; align-items: center; }
        .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--primary-light); color: var(--primary); }
        .badge-success { background: #dcfce7; color: var(--success); }
        .badge-danger { background: #fee2e2; color: var(--danger); }
        .badge-primary { background: var(--primary-light); color: var(--primary); }
        .loader-wrap { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .loader-wrap i { font-size: 30px; margin-bottom: 12px; color: var(--primary); }
        .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 36px; margin-bottom: 10px; display: block; opacity: 0.3; }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <img src="/utils/logo.png" alt="Logo" onerror="this.style.display='none'">
        <span>BasketHub</span>
    </div>
    <div class="sidebar-section">Gestão</div>
    <button class="nav-link" data-target="dashboard" onclick="switchTab('dashboard')"><i class="fa-solid fa-house"></i> Dashboard</button>
    <button class="nav-link" data-target="eventos" onclick="switchTab('eventos')"><i class="fa-solid fa-trophy"></i> Eventos</button>
    <button class="nav-link" data-target="jogos" onclick="switchTab('jogos')"><i class="fa-solid fa-basketball"></i> Jogos</button>
    <div class="sidebar-section">Participantes</div>
    <button class="nav-link" data-target="equipas-evento" onclick="switchTab('equipas-evento')"><i class="fa-solid fa-shield-halved"></i> Equipas em Eventos</button>
    <button class="nav-link" data-target="inscricoes" onclick="switchTab('inscricoes')"><i class="fa-solid fa-clipboard-list"></i> Inscrições</button>
    <button class="nav-link" data-target="organizadores" onclick="switchTab('organizadores')"><i class="fa-solid fa-id-badge"></i> Organizadores</button>
    <div class="sidebar-section">Resultados</div>
    <button class="nav-link" data-target="classificacoes" onclick="switchTab('classificacoes')"><i class="fa-solid fa-ranking-star"></i> Classificações</button>
    <div class="sidebar-footer">
        <button class="btn-logout" onclick="sair()"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </div>
</aside>
<div class="main-wrapper">
    <header class="topbar">
        <div class="topbar-icon"><i class="fa-solid fa-clipboard-list"></i></div>
        <span id="current-view-title">Dashboard</span>
        <span class="role-badge">ORGANIZADOR</span>
    </header>
    <main id="view-container"></main>
</div>
<script>
    (function() {
        const role = localStorage.getItem('role');
        if (!role || role !== 'ORGANIZADOR') window.location.href = '/';
    })();

    function sair() { localStorage.removeItem('role'); window.location.href = '/'; }

    async function apiCall(url, method = 'GET', data = null) {
        const role = localStorage.getItem('role');
        if (!role) { window.location.href = '/'; return; }
        const sep = url.includes('?') ? '&' : '?';
        const finalUrl = `${url}${sep}role=${role}`;
        const cfg = { method, headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' } };
        if (data && (method === 'POST' || method === 'PUT')) cfg.body = JSON.stringify(data);
        const res = await fetch(finalUrl, cfg);
        const ct = res.headers.get('content-type') || '';
        if (!res.ok) { const t = await res.text(); throw new Error(t || `Erro ${res.status}`); }
        if (ct.includes('text/html')) throw new Error('O servidor devolveu HTML em vez de JSON.');
        if (res.status === 204) return null;
        return res.json();
    }

    function showLoader() {
        document.getElementById('view-container').innerHTML = `<div class="loader-wrap"><i class="fa-solid fa-basketball fa-spin"></i><p>A carregar dados...</p></div>`;
    }

    function emptyRow(cols, icon, msg) {
        return `<tr><td colspan="${cols}"><div class="empty-state"><i class="fa-solid ${icon}"></i><p>${msg}</p></div></td></tr>`;
    }

    async function switchTab(tab) {
        document.querySelectorAll('.nav-link').forEach(b => b.classList.toggle('active', b.dataset.target === tab));
        try {
            switch(tab) {
                case 'dashboard':      loadDashboard(); break;
                case 'eventos':        await loadEventos(); break;
                case 'jogos':          await loadJogos(); break;
                case 'equipas-evento': await loadEquipasEvento(); break;
                case 'inscricoes':     await loadInscricoes(); break;
                case 'organizadores':  await loadOrganizadores(); break;
                case 'classificacoes': await loadClassificacoes(); break;
            }
        } catch(e) {
            document.getElementById('view-container').innerHTML = `<div class="section-card" style="text-align:center;color:var(--danger);"><i class="fa-solid fa-triangle-exclamation" style="font-size:28px;margin-bottom:10px;"></i><p>Erro ao carregar este módulo.</p></div>`;
        }
    }

    function loadDashboard() {
        document.getElementById('current-view-title').innerText = 'Dashboard';
        document.getElementById('view-container').innerHTML = `
        <div class="grid-dashboard">
            <div class="card-stat"><div class="stat-details"><h3>Plataforma</h3><p>BasketHub</p></div><i class="fa-solid fa-basketball stat-icon" style="color:#f97316;"></i></div>
            <div class="card-stat"><div class="stat-details"><h3>Perfil Ativo</h3><p>Organizador</p></div><i class="fa-solid fa-clipboard-list stat-icon" style="color:var(--success);"></i></div>
        </div>
        <div class="section-card">
            <div class="section-header"><h2>Painel de Organização</h2></div>
            <p style="color:var(--text-muted);line-height:1.7;font-size:14px;">Gere eventos, define calendários de jogos, valida inscrições e acompanha os resultados das competições.</p>
        </div>`;
    }

    // ── EVENTOS ───────────────────────────────────────────────────
    async function loadEventos() {
        document.getElementById('current-view-title').innerText = 'Eventos';
        showLoader();
        const [dados, pavilhoes, organizadores] = await Promise.all([apiCall('/eventos'), apiCall('/pavilhoes'), apiCall('/organizadores')]);
        window._pavilhoes = pavilhoes; window._organizadores = organizadores;
        const optPav = pavilhoes.map(p => `<option value="${p.id}">${p.nome} (${p.cidade})</option>`).join('');
        const optOrg = organizadores.map(o => `<option value="${o.id}">${o.nome}</option>`).join('');
        document.getElementById('view-container').innerHTML = `
        <div class="section-card">
            <div class="section-header"><h2>Criar Evento</h2></div>
            <form id="form-evento" onsubmit="submitEvento(event)">
                <div class="flex-form-row">
                    <div class="modal-form-group"><label>Nome do Evento</label><input type="text" id="ev-nome" required></div>
                    <div class="modal-form-group"><label>Data (AAAA-MM-DD)</label><input type="text" id="ev-data" placeholder="2025-06-01" required></div>
                    <div class="modal-form-group"><label>Tipo</label>
                        <select id="ev-type" onchange="toggleTematica(this.value)">
                            <option value="TORNEIO">Torneio Eliminatório</option>
                            <option value="AMIGAVEL">Amigável Individual</option>
                            <option value="CLINICA">Clínica de Formação</option>
                        </select>
                    </div>
                </div>
                <div class="flex-form-row">
                    <div class="modal-form-group"><label>Pavilhão</label><select id="ev-pavilhao">${optPav}</select></div>
                    <div class="modal-form-group"><label>Organizador</label><select id="ev-organizador">${optOrg}</select></div>
                    <div class="modal-form-group" id="tematica-wrapper" style="display:none;"><label>Temática</label><input type="text" id="ev-tematica"></div>
                </div>
                <button type="submit" class="btn btn-success"><i class="fa-solid fa-plus"></i> Criar Evento</button>
            </form>
        </div>
        <div class="section-card">
            <div class="section-header"><h2>Eventos Registados</h2></div>
            <div class="table-responsive">
                <table class="table-hub">
                    <thead><tr><th>ID</th><th>Nome</th><th>Data</th><th>Pavilhão</th><th>Organizador</th><th>Ações</th></tr></thead>
                    <tbody id="tbody-eventos">${renderEventos(dados, pavilhoes, organizadores)}</tbody>
                </table>
            </div>
        </div>`;
    }

    function renderEventos(dados, pav, org) {
        const pavilhoes = pav || window._pavilhoes || [];
        const organizadores = org || window._organizadores || [];
        if (!dados || !dados.length) return emptyRow(6, 'fa-trophy', 'Nenhum evento criado.');
        return dados.map(ev => {
            const p = pavilhoes.find(p => p.id === ev.pavilhaoId)?.nome || `Pavilhão #${ev.pavilhaoId}`;
            const o = organizadores.find(o => o.id === ev.organizadorId)?.nome || `Org #${ev.organizadorId}`;
            return `<tr>
            <td>${ev.id}</td><td><strong>${ev.nome}</strong></td><td>${ev.data}</td><td>${p}</td><td>${o}</td>
            <td class="actions-cell">
                <button class="btn btn-success" style="padding:6px 12px;font-size:12px;" onclick="actionPost('/eventos/${ev.id}/agendamento', refreshEventos)"><i class="fa-solid fa-wand-magic-sparkles"></i> Sorteio</button>
                <button class="btn-icon delete" onclick="deleteEvento(${ev.id})"><i class="fa-solid fa-trash"></i></button>
            </td>
        </tr>`;
        }).join('');
    }

    async function submitEvento(e) {
        e.preventDefault();
        try {
            const type = document.getElementById('ev-type').value;
            const body = {
                type,
                nome: document.getElementById('ev-nome').value,
                data: document.getElementById('ev-data').value,
                pavilhaoId: parseInt(document.getElementById('ev-pavilhao').value, 10),
                organizadorId: parseInt(document.getElementById('ev-organizador').value, 10)
            };
            if (type === 'CLINICA') body.tematica = document.getElementById('ev-tematica').value;

            // Envia para o servidor
            await apiCall('/eventos', 'POST', body);

            e.target.reset();
            await refreshEventos();
        } catch (error) {
            console.error("Erro ao submeter evento:", error);
            // Força a atualização da lista caso o servidor tenha guardado mas falhado no JSON
            e.target.reset();
            await refreshEventos();
        }
    }

    async function refreshEventos() {
        const dados = await apiCall('/eventos');
        const el = document.getElementById('tbody-eventos');
        if (el) el.innerHTML = renderEventos(dados, window._pavilhoes, window._organizadores);
    }

    async function deleteEvento(id) {
        if (!confirm('Eliminar este evento?')) return;
        try {
            await apiCall(`/eventos/${id}`, 'DELETE');
            await refreshEventos();
        } catch (error) {
            console.error("Erro ao eliminar evento:", error);
            await refreshEventos();
        }
    }

    function toggleTematica(v) {
        const el = document.getElementById('tematica-wrapper');
        if (el) el.style.display = v === 'CLINICA' ? 'block' : 'none';
    }

    async function actionPost(url, callback) {
        try {
            await apiCall(url, 'POST');
            alert('Operação realizada com sucesso!');
            await callback();
        } catch (error) {
            console.error("Erro na ação POST:", error);
            // Se falhar apenas no formato da resposta, assume sucesso e atualiza
            alert('Operação realizada!');
            await callback();
        }
    }

    // ── JOGOS ─────────────────────────────────────────────────────
    async function loadJogos() {
        document.getElementById('current-view-title').innerText = 'Jogos';
        showLoader();
        const [jogos, eventos, equipas, pavilhoes] = await Promise.all([apiCall('/jogos'), apiCall('/eventos'), apiCall('/equipas'), apiCall('/pavilhoes')]);
        window._eventos = eventos; window._equipas = equipas; window._pavilhoes = pavilhoes;
        const optEv = eventos.map(ev => `<option value="${ev.id}">${ev.nome}</option>`).join('');
        const optEq = equipas.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
        const optPav = pavilhoes.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
        document.getElementById('view-container').innerHTML = `
        <div class="section-card">
            <div class="section-header"><h2>Criar Jogo</h2></div>
            <form id="form-jogo" onsubmit="submitJogo(event)">
                <div class="flex-form-row">
                    <div class="modal-form-group"><label>Evento</label><select id="jg-evento">${optEv}</select></div>
                    <div class="modal-form-group"><label>Ronda</label><input type="number" id="jg-ronda" value="1" min="1" required></div>
                    <div class="modal-form-group"><label>Equipa Casa</label><select id="jg-casa">${optEq}</select></div>
                    <div class="modal-form-group"><label>Equipa Fora</label><select id="jg-fora"><option value="">-- BYE --</option>${optEq}</select></div>
                </div>
                <div class="flex-form-row">
                    <div class="modal-form-group"><label>Pavilhão</label><select id="jg-pavilhao">${optPav}</select></div>
                    <div class="modal-form-group"><label>Pts Casa</label><input type="number" id="jg-ptscasa" value="0"></div>
                    <div class="modal-form-group"><label>Pts Fora</label><input type="number" id="jg-ptsfora" value="0"></div>
                    <div class="modal-form-group"><label>Data/Hora</label><input type="text" id="jg-datahora" placeholder="Sábado, 16h" required></div>
                </div>
                <button type="submit" class="btn btn-success"><i class="fa-solid fa-plus"></i> Registar Jogo</button>
            </form>
        </div>
        <div class="section-card">
            <div class="section-header"><h2>Calendário de Jogos</h2></div>
            <div class="table-responsive">
                <table class="table-hub">
                    <thead><tr><th>ID</th><th>Evento</th><th>Ronda</th><th>Encontro</th><th>Resultado</th><th>Horário</th><th>Estado</th><th>Ações</th></tr></thead>
                    <tbody id="tbody-jogos">${renderJogos(jogos, eventos, equipas, pavilhoes)}</tbody>
                </table>
            </div>
        </div>`;
    }

    function renderJogos(dados, eventos, equipas, pavilhoes) {
        const evs = eventos || window._eventos || [];
        const eqs = equipas || window._equipas || [];
        if (!dados || !dados.length) return emptyRow(8, 'fa-basketball', 'Nenhum jogo registado.');
        return dados.map(j => {
            const ev = evs.find(ev => ev.id === j.eventoId)?.nome || `Evento #${j.eventoId}`;
            const casa = eqs.find(e => e.id === j.equipaCasaId)?.nome || `Equipa #${j.equipaCasaId}`;
            const fora = j.equipaForaId ? (eqs.find(e => e.id === j.equipaForaId)?.nome || `Equipa #${j.equipaForaId}`) : 'BYE';
            const estadoBadge = j.estado === 'CONCLUIDO' ? '<span class="badge badge-success">Concluído</span>' : j.estado === 'CANCELADO' ? '<span class="badge badge-danger">Cancelado</span>' : '<span class="badge">Agendado</span>';
            return `<tr>
            <td>${j.id}</td><td>${ev}</td><td>Ronda ${j.ronda}</td>
            <td><strong>${casa}</strong> vs <strong>${fora}</strong></td>
            <td><span class="badge" style="font-weight:700;">${j.pontosCasa} – ${j.pontosFora}</span></td>
            <td>${j.dataHora}</td><td>${estadoBadge}</td>
            <td class="actions-cell">
                <button class="btn-icon edit" onclick="editarResultado(${j.id},${j.pontosCasa},${j.pontosFora})"><i class="fa-solid fa-pen"></i></button>
                <button class="btn-icon delete" onclick="deleteJogo(${j.id})"><i class="fa-solid fa-trash"></i></button>
            </td>
        </tr>`;
        }).join('');
    }

    async function submitJogo(e) {
        e.preventDefault();
        const casaId = parseInt(document.getElementById('jg-casa').value, 10);
        const foraVal = document.getElementById('jg-fora').value;
        const foraId = foraVal ? parseInt(foraVal, 10) : null;
        const ptsCasa = parseInt(document.getElementById('jg-ptscasa').value, 10);
        const ptsFora = parseInt(document.getElementById('jg-ptsfora').value, 10);

        if (foraId !== null && casaId === foraId) { alert('A equipa da casa e a visitante não podem ser a mesma.'); return; }
        if (foraId !== null && ptsCasa === ptsFora) { alert('O resultado não pode terminar empatado.'); return; }

        try {
            await apiCall('/jogos', 'POST', {
                eventoId: parseInt(document.getElementById('jg-evento').value, 10),
                ronda: parseInt(document.getElementById('jg-ronda').value, 10),
                equipaCasaId: casaId, equipaForaId: foraId,
                pavilhaoId: parseInt(document.getElementById('jg-pavilhao').value, 10),
                pontosCasa: ptsCasa, pontosFora: ptsFora,
                dataHora: document.getElementById('jg-datahora').value
            });

            e.target.reset();
            await refreshJogos();
        } catch (error) {
            console.error("Erro ao registar jogo:", error);
            e.target.reset();
            await refreshJogos();
        }
    }

    async function refreshJogos() {
        const dados = await apiCall('/jogos');
        const el = document.getElementById('tbody-jogos');
        if (el) el.innerHTML = renderJogos(dados, window._eventos, window._equipas, window._pavilhoes);
    }

    async function deleteJogo(id) {
        if (!confirm('Eliminar este jogo?')) return;
        try {
            await apiCall(`/jogos/${id}`, 'DELETE');
            await refreshJogos();
        } catch (error) {
            console.error("Erro ao eliminar jogo:", error);
            await refreshJogos();
        }
    }

    function editarResultado(id, ptsCasa, ptsFora) {
        const btn = document.querySelector(`button[onclick*="editarResultado(${id},"]`);
        if (!btn) return;
        const cells = btn.closest('tr').querySelectorAll('td');
        cells[4].innerHTML = `<div style="display:flex;gap:6px;align-items:center;"><input type="number" id="res-casa-${id}" value="${ptsCasa}" style="width:60px;padding:5px 8px;border-radius:6px;border:1px solid var(--border-color);"><span>–</span><input type="number" id="res-fora-${id}" value="${ptsFora}" style="width:60px;padding:5px 8px;border-radius:6px;border:1px solid var(--border-color);"></div>`;
        cells[7].innerHTML = `<div class="actions-cell"><button class="btn btn-success" style="padding:6px 12px;font-size:12px;" onclick="guardarResultado(${id})"><i class="fa-solid fa-check"></i> Guardar</button><button class="btn btn-secondary" style="padding:6px 12px;font-size:12px;" onclick="refreshJogos()">Cancelar</button></div>`;
    }

    async function guardarResultado(id) {
        const ptsCasa = parseInt(document.getElementById(`res-casa-${id}`).value, 10);
        const ptsFora = parseInt(document.getElementById(`res-fora-${id}`).value, 10);
        if (ptsCasa === ptsFora) { alert('O resultado não pode terminar empatado.'); return; }

        try {
            await apiCall(`/jogos/${id}`, 'PUT', { pontosCasa: ptsCasa, pontosFora: ptsFora });
            await refreshJogos();
        } catch (error) {
            console.error("Erro ao guardar resultado do jogo:", error);
            await refreshJogos();
        }
    }

    // ── EQUIPAS POR EVENTO ────────────────────────────────────────
    async function loadEquipasEvento() {
        document.getElementById('current-view-title').innerText = 'Equipas em Eventos';
        showLoader();
        const [inscricoes, equipas, eventos] = await Promise.all([apiCall('/inscricoes'), apiCall('/equipas'), apiCall('/eventos')]);
        window._equipas = equipas; window._eventos = eventos;
        const optEq = equipas.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
        const optEv = eventos.map(ev => `<option value="${ev.id}">${ev.nome}</option>`).join('');
        const secoes = renderSecoesPorEvento(inscricoes, equipas, eventos);
        document.getElementById('view-container').innerHTML = `
        <div class="section-card">
            <div class="section-header"><h2>Inscrever Equipa em Evento</h2></div>
            <form id="form-inscricao-ev" onsubmit="submitInscricaoEvento(event)">
                <div class="flex-form-row">
                    <div class="modal-form-group"><label>Equipa</label><select id="ins-equipa">${optEq}</select></div>
                    <div class="modal-form-group"><label>Evento</label><select id="ins-evento">${optEv}</select></div>
                    <div class="modal-form-group"><label>Data (AAAA-MM-DD)</label><input type="text" id="ins-data" placeholder="2025-06-01" required></div>
                </div>
                <button type="submit" class="btn btn-success"><i class="fa-solid fa-plus"></i> Inscrever Equipa</button>
            </form>
        </div>
        <div id="secoes-eventos">${secoes || '<div class="section-card"><div class="empty-state"><i class="fa-solid fa-shield-halved"></i><p>Nenhuma inscrição registada.</p></div></div>'}</div>`;
    }

    function renderSecoesPorEvento(inscricoes, equipas, eventos) {
        const eqs = equipas || window._equipas || [];
        const evs = eventos || window._eventos || [];
        const porEvento = {};
        inscricoes.forEach(i => { if (!porEvento[i.eventoId]) porEvento[i.eventoId] = []; porEvento[i.eventoId].push(i); });
        return Object.entries(porEvento).map(([evId, inscs]) => {
            const evNome = evs.find(ev => ev.id == evId)?.nome || `Evento #${evId}`;
            const rows = inscs.map(i => {
                const eq = eqs.find(e => e.id === i.equipaId)?.nome || `Equipa #${i.equipaId}`;
                return `<tr><td><strong>${eq}</strong></td><td>${i.dataInscricao}</td><td class="actions-cell"><button class="btn-icon delete" onclick="deleteInscricaoEvento(${i.id})"><i class="fa-solid fa-trash"></i></button></td></tr>`;
            }).join('');
            return `<div class="section-card"><div class="section-header"><h2><i class="fa-solid fa-trophy" style="color:var(--success);margin-right:8px;"></i>${evNome}</h2></div><div class="table-responsive"><table class="table-hub"><thead><tr><th>Equipa</th><th>Data Inscrição</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
        }).join('');
    }

    async function submitInscricaoEvento(e) {
        e.preventDefault();
        try {
            await apiCall('/inscricoes', 'POST', {
                equipaId: parseInt(document.getElementById('ins-equipa').value, 10),
                eventoId: parseInt(document.getElementById('ins-evento').value, 10),
                dataInscricao: document.getElementById('ins-data').value
            });

            e.target.reset();
            const inscricoes = await apiCall('/inscricoes');
            const el = document.getElementById('secoes-eventos');
            if (el) el.innerHTML = renderSecoesPorEvento(inscricoes, window._equipas, window._eventos) || '<div class="section-card"><div class="empty-state"><i class="fa-solid fa-shield-halved"></i><p>Nenhuma inscrição registada.</p></div></div>';
        } catch (error) {
            console.error("Erro ao inscrever equipa no evento:", error);
            e.target.reset();
            // Fallback seguro de atualização
            const inscricoes = await apiCall('/inscricoes').catch(() => []);
            const el = document.getElementById('secoes-eventos');
            if (el) el.innerHTML = renderSecoesPorEvento(inscricoes, window._equipas, window._eventos);
        }
    }

    async function deleteInscricaoEvento(id) {
        if (!confirm('Remover esta equipa do evento?')) return;
        try {
            await apiCall(`/inscricoes/${id}`, 'DELETE');
            const inscricoes = await apiCall('/inscricoes');
            const el = document.getElementById('secoes-eventos');
            if (el) el.innerHTML = renderSecoesPorEvento(inscricoes, window._equipas, window._eventos) || '<div class="section-card"><div class="empty-state"><i class="fa-solid fa-shield-halved"></i><p>Nenhuma inscrição registada.</p></div></div>';
        } catch (error) {
            console.error("Erro ao remover inscrição do evento:", error);
            const inscricoes = await apiCall('/inscricoes').catch(() => []);
            const el = document.getElementById('secoes-eventos');
            if (el) el.innerHTML = renderSecoesPorEvento(inscricoes, window._equipas, window._eventos);
        }
    }

    // ── INSCRIÇÕES ────────────────────────────────────────────────
    async function loadInscricoes() {
        document.getElementById('current-view-title').innerText = 'Inscrições';
        showLoader();
        const [inscricoes, equipas, eventos] = await Promise.all([apiCall('/inscricoes'), apiCall('/equipas'), apiCall('/eventos')]);
        window._equipas = equipas; window._eventos = eventos;
        document.getElementById('view-container').innerHTML = `
        <div class="section-card">
            <div class="section-header"><h2>Gestão de Inscrições</h2></div>
            <div class="table-responsive">
                <table class="table-hub">
                    <thead><tr><th>ID</th><th>Equipa</th><th>Evento</th><th>Data</th><th>Estado</th><th>Ações</th></tr></thead>
                    <tbody id="tbody-inscricoes">${renderInscricoes(inscricoes, equipas, eventos)}</tbody>
                </table>
            </div>
        </div>`;
    }

    function renderInscricoes(dados, equipas, eventos) {
        const eqs = equipas || window._equipas || [];
        const evs = eventos || window._eventos || [];
        if (!dados || !dados.length) return emptyRow(6, 'fa-clipboard-list', 'Nenhuma inscrição.');
        return dados.map(i => {
            const eq = eqs.find(e => e.id === i.equipaId)?.nome || `Equipa #${i.equipaId}`;
            const ev = evs.find(ev => ev.id === i.eventoId)?.nome || `Evento #${i.eventoId}`;
            return `<tr><td>${i.id}</td><td><strong>${eq}</strong></td><td>${ev}</td><td>${i.dataInscricao}</td><td><span class="badge badge-success">Válida</span></td><td class="actions-cell"><button class="btn-icon delete" onclick="deleteInscricao(${i.id})"><i class="fa-solid fa-trash"></i></button></td></tr>`;
        }).join('');
    }

    async function deleteInscricao(id) {
        if (!confirm('Eliminar esta inscrição?')) return;
        await apiCall(`/inscricoes/${id}`, 'DELETE');
        const dados = await apiCall('/inscricoes');
        const el = document.getElementById('tbody-inscricoes');
        if (el) el.innerHTML = renderInscricoes(dados, window._equipas, window._eventos);
    }

    // ── ORGANIZADORES ─────────────────────────────────────────────
    async function loadOrganizadores() {
        document.getElementById('current-view-title').innerText = 'Organizadores';
        showLoader();
        const dados = await apiCall('/organizadores');
        document.getElementById('view-container').innerHTML = `
        <div class="section-card">
            <div class="section-header"><h2>Adicionar Organizador</h2></div>
            <form id="form-organizador" onsubmit="submitOrganizador(event)">
                <div class="flex-form-row">
                    <div class="modal-form-group"><label>Nome Completo</label><input type="text" id="org-nome" required></div>
                    <div class="modal-form-group"><label>Contacto</label><input type="text" id="org-contacto" required></div>
                    <div class="modal-form-group"><label>E-mail</label><input type="email" id="org-email" required></div>
                </div>
                <button type="submit" class="btn btn-success"><i class="fa-solid fa-plus"></i> Registar Organizador</button>
            </form>
        </div>
        <div class="section-card">
            <div class="section-header"><h2>Lista de Organizadores</h2></div>
            <div class="table-responsive">
                <table class="table-hub">
                    <thead><tr><th>ID</th><th>Nome</th><th>Contacto</th><th>Email</th><th>Ações</th></tr></thead>
                    <tbody id="tbody-organizadores">${renderOrganizadores(dados)}</tbody>
                </table>
            </div>
        </div>`;
    }

    function renderOrganizadores(dados) {
        if (!dados || !dados.length) return emptyRow(5, 'fa-id-badge', 'Nenhum organizador.');
        return dados.map(o => `<tr><td>${o.id}</td><td><strong>${o.nome}</strong></td><td>${o.contacto}</td><td>${o.email}</td><td class="actions-cell"><button class="btn-icon delete" onclick="deleteOrganizador(${o.id})"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('');
    }

    async function submitOrganizador(e) {
        e.preventDefault();
        await apiCall('/organizadores', 'POST', { nome: document.getElementById('org-nome').value, contacto: document.getElementById('org-contacto').value, email: document.getElementById('org-email').value });
        e.target.reset();
        const dados = await apiCall('/organizadores');
        const el = document.getElementById('tbody-organizadores');
        if (el) el.innerHTML = renderOrganizadores(dados);
    }

    async function deleteOrganizador(id) {
        if (!confirm('Eliminar este organizador?')) return;
        await apiCall(`/organizador/${id}`, 'DELETE');
        const dados = await apiCall('/organizadores');
        const el = document.getElementById('tbody-organizadores');
        if (el) el.innerHTML = renderOrganizadores(dados);
    }

    // ── CLASSIFICAÇÕES ────────────────────────────────────────────
    async function loadClassificacoes() {
        document.getElementById('current-view-title').innerText = 'Classificações';
        showLoader();
        const [dados, equipas] = await Promise.all([apiCall('/classificacoes/geral'), apiCall('/equipas')]);
        const rows = dados.map((c, i) => {
            const eq = equipas.find(e => e.id === c.equipaId)?.nome || `Equipa #${c.equipaId}`;
            return `<tr><td><strong>${i+1}º</strong></td><td><strong>${eq}</strong></td><td>${c.jogos}</td><td>${c.vitorias}</td><td>${c.derrotas}</td><td><code>${c.pontosMarcados}:${c.pontosSofridos}</code></td><td>${c.saldo > 0 ? '+'+c.saldo : c.saldo}</td><td><span class="badge badge-success">${c.pontos} Pts</span></td></tr>`;
        }).join('');
        document.getElementById('view-container').innerHTML = `
        <div class="section-card">
            <div class="section-header"><h2>Tabela Classificativa Geral</h2></div>
            <div class="table-responsive">
                <table class="table-hub">
                    <thead><tr><th>Pos</th><th>Equipa</th><th>J</th><th>V</th><th>D</th><th>Marcados:Sofridos</th><th>+/-</th><th>Pontuação</th></tr></thead>
                    <tbody>${rows || emptyRow(8,'fa-ranking-star','Sem dados.')}</tbody>
                </table>
            </div>
        </div>`;
    }

    switchTab('dashboard');
</script>
</body>
</html>
