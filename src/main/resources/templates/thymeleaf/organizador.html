<div class="section-card role-organizador role-administrador">
    <div class="section-header">
        <h2><i class="fa-solid fa-calendar-plus" style="color: var(--text-muted);"></i> Criar Novo Evento</h2>
    </div>

    <form id="organizadorEventoForm" onsubmit="submeterEvento(event)">
        <div class="form-group" style="display: flex; flex-direction: column; margin-bottom: 18px;">
            <label style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">Nome Comercial</label>
            <input type="text" id="ev-nome-org" placeholder="Ex: Torneio de Abertura APB" required maxlength="100"/>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; margin-bottom: 18px;">
            <label style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">Modelo Regulamentar</label>
            <select id="ev-tipo-org" required>
                <option value="" disabled selected>-- Escolha o Modelo Regulamentar... --</option>
                <option value="TORNEIO">Torneio (Eliminatórias / Mata-Mata)</option>
                <option value="AMIGAVEL">Jogo Amigável Individual</option>
                <option value="CLINICA">Clínica / Formação de Treinadores</option>
            </select>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; margin-bottom: 18px;">
            <label style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">Localização (Pavilhão)</label>
            <select id="ev-pavilhao-org" required>
                <option value="" disabled selected>-- Escolha um Pavilhão Disponível... --</option>
                <option th:each="p : ${pavilhoes}"
                        th:value="${p.id}"
                        th:text="${p.nome} + ' — ' + ${p.cidade}">
                </option>
            </select>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; margin-bottom: 18px;">
            <label style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">Supervisor Responsável</label>
            <select id="ev-organizador-org" required>
                <option value="" disabled selected>-- Escolha o Supervisor do Evento... --</option>
                <option th:each="o : ${organizadores}"
                        th:value="${o.id}"
                        th:text="${o.nome}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn" style="width: 100%; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
            <i class="fa-solid fa-cloud-arrow-up"></i> Publicar Evento no Sistema
        </button>
    </form>
</div>

<div class="section-card role-organizador role-administrador">
    <div class="section-header">
        <h2><i class="fa-solid fa-diagram-project" style="color: var(--text-muted);"></i> Avançar Chaveamento / Gerar Nova Ronda</h2>
    </div>

    <div class="form-group" style="display: flex; flex-direction: column; margin-bottom: 18px;">
        <label style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">Selecione o Torneio Alvo</label>
        <select id="eventoRondaSelect">
            <option value="" disabled selected>-- Escolha um Evento Ativo para Cruzamentos... --</option>
            <option th:each="e : ${eventos}"
                    th:value="${e.id}"
                    th:text="${e.nome}">
        </select>
    </div>

    <button type="button" class="btn btn-secondary" onclick="gerarRonda()" style="width: 100%; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; background-color: var(--secondary);">
        <i class="fa-solid fa-calculator"></i> Computar Cruzamentos de Equipas
    </button>
</div>

<script>
    async function submeterEvento(event) {
        event.preventDefault();
        const perfil = localStorage.getItem('perfil') || 'JOGADOR';

        const dados = {
            nome: document.getElementById('ev-nome-org').value,
            tipo: document.getElementById('ev-tipo-org').value,
            pavilhaoId: parseInt(document.getElementById('ev-pavilhao-org').value, 10),
            organizadorId: parseInt(document.getElementById('ev-organizador-org').value, 10)
        };

        try {
            await apiCall(`/organizador/evento?perfil=${perfil}`, 'POST', dados);
            alert('Evento publicado estruturalmente com sucesso!');
            document.getElementById('organizadorEventoForm').reset();
        } catch(e) {
            alert('Falha ao processar a criação do evento.');
        }
    }

    async function gerarRonda() {
        const evId = document.getElementById("eventoRondaSelect").value;
        if(!evId) {
            alert("Por favor, selecione um evento da lista antes de tentar computar os cruzamentos.");
            return;
        }

        const perfil = localStorage.getItem('perfil') || 'JOGADOR';
        try {
            const d = await apiCall(`/eventos/${evId}/agendamento?perfil=${perfil}`, 'POST');
            alert(`Sucesso: ${d.mensagem}\nJogos criados nesta ronda: ${d.jogosCriados}`);
        } catch(err) {
            alert("Ocorreu um erro ao computar as chaves de jogos.");
        }
    }

    // Alinha a visibilidade do painel imediatamente ao injetar na view
    aplicarFiltroDeAcesso();
</script>
